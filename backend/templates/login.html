{% extends "layout.html" %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 2rem auto;">
  <h2 id="form-title">Login to ChurnAI</h2>
  
  <form id="auth-form" style="display: flex; flex-direction: column; gap: 1rem;">
    <input type="email" id="email" class="form-input" placeholder="Email Address" required />
    <input type="password" id="password" class="form-input" placeholder="Password" required />
    
    <div id="error-msg" style="color: #f87171; font-size: 0.9rem; display: none;"></div>
    
    <button type="submit" class="btn-primary" style="margin-top: 1rem;">Sign In</button>
  </form>
  
  <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
    Don't have an account? 
    <span style="color: var(--accent-primary); cursor: pointer;" onclick="alert('Registration not fully hooked up in this demo.')">
      Sign up
    </span>
  </p>
</div>

<script>
  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-msg');
    
    errorDiv.style.display = 'none';
    
    try {
      // Using AppAPI defined in static/js/api.js
      const resp = await AppAPI.loginUser({ username: email, password: password, role: 'admin' });
      localStorage.setItem('token', resp.access_token);
      window.location.href = '/admin';
    } catch(err) {
      errorDiv.textContent = err.message;
      errorDiv.style.display = 'block';
    }
  });
</script>
{% endblock %}
