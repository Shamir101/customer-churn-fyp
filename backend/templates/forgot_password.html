{% extends "layout.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card" style="animation:fadeIn 0.5s ease-out;">
    <div class="auth-logo">⚡ ChurnSense</div>
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub">Enter your email and we'll send a reset link if an account exists.</p>
    <form id="fp-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div id="success-msg" class="success-msg" style="display:none;"></div>
      <div id="error-msg"   class="error-msg"   style="display:none;"></div>
      <button type="submit" id="btn-reset" class="btn-primary btn-full">Send Reset Link</button>
    </form>
    <p class="auth-footer"><a href="/login" class="link">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('fp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn  = document.getElementById('btn-reset');
  const succ = document.getElementById('success-msg');
  const err  = document.getElementById('error-msg');
  succ.style.display = err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const res = await AppAPI.forgotPassword(document.getElementById('email').value.trim());
    succ.textContent   = res.message;
    succ.style.display = 'block';
  } catch(e2) {
    err.textContent   = e2.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
});
</script>
{% endblock %}
